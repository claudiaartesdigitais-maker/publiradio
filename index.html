<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel de Postagem - Rádio</title>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        h2 { color: #004a99; margin-bottom: 20px; text-transform: uppercase; font-size: 18px; }
        
        label { display: block; margin-bottom: 5px; font-weight: bold; color: #555; text-align: left; }
        input, select { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        
        .btn { width: 100%; padding: 15px; border: none; border-radius: 8px; color: white; font-weight: bold; cursor: pointer; font-size: 14px; text-transform: uppercase; margin-bottom: 15px; transition: 0.3s; display: block; text-decoration: none; box-sizing: border-box; }
        .btn-24h { background: #004a99; }
        .btn-destaque { background: #b8860b; }
        .btn:hover { opacity: 0.8; transform: scale(1.02); }
        
        #status { font-weight: bold; margin-top: 10px; padding: 10px; border-radius: 5px; display: none; font-size: 14px; }
        hr { border: 0; border-top: 1px solid #eee; margin: 25px 0; }
        p { font-size: 13px; color: #666; margin-bottom: 15px; line-height: 1.4; }
    </style>
</head>
<body>

<div class="card">
    <h2>Mural 24 Horas</h2>
    
    <label>Link (YouTube / Rede Social)</label>
    <input type="text" id="link" placeholder="Cole o link aqui...">

    <label>Título</label>
    <input type="text" id="titulo" placeholder="Digite o título...">

    <label>Tipo</label>
    <select id="tipo">
        <option value="NOTÍCIA">NOTÍCIA</option>
        <option value="VÍDEO">VÍDEO</option>
    </select>

    <button class="btn btn-24h" onclick="enviar24h()">🚀 Publicar no Mural</button>
    <div id="status"></div>

    <hr>

    <h2>Destaques</h2>
    <p>Para postar nos <b>Destaques</b>, clique no botão abaixo para abrir o formulário de upload de arquivos:</p>
    
    <a href="https://forms.gle/CprGUbdaarpTcwKBA" target="_blank" class="btn btn-destaque">📁 Abrir Formulário de Upload</a>
</div>

<script>
    // Link do seu Script da Planilha "Sistema da Rádio" (A que já funciona)
    const URL_SISTEMA_RADIO = "https://script.google.com/macros/s/AKfycbz-ZM201t55jwfICQ6BSmGGT0mZUWClAXbFAKGhFopCcFJzKmGN_sxqV4UAPlCsSutM/exec"; 

    async function enviar24h() {
        const link = document.getElementById('link').value.trim();
        const titulo = document.getElementById('titulo').value.trim();
        const tipo = document.getElementById('tipo').value;
        const status = document.getElementById('status');

        if(!link || !titulo) {
            alert("Por favor, preencha o link e o título!");
            return;
        }

        status.style.display = "block";
        status.style.background = "#fff3cd";
        status.style.color = "#856404";
        status.innerText = "Enviando postagem...";

        try {
            await fetch(URL_SISTEMA_RADIO, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    link: link,
                    titulo: titulo,
                    tipo: tipo
                })
            });

            status.style.background = "#d4edda";
            status.style.color = "#155724";
            status.innerText = "✅ Sucesso! Postado no Mural 24h.";
            
            // Limpa os campos
            document.getElementById('link').value = "";
            document.getElementById('titulo').value = "";
            
            // Esconde a mensagem de sucesso após 3 segundos
            setTimeout(() => { status.style.display = "none"; }, 3000);

        } catch (e) {
            status.style.background = "#f8d7da";
            status.style.color = "#721c24";
            status.innerText = "❌ Erro ao enviar. Tente novamente.";
        }
    }
</script>

</body>
</html>
